version: "3.1"

services:
  frontend:
    build:
      context: ./
      dockerfile: ./docker/services/frontend.Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - ./services/frontend/node_modules:/app/services/frontend/node_modules
    command: bash -c "yarn workspace @services/frontend dev"
  backend:
    build:
      context: ./
      dockerfile: ./docker/services/backend.Dockerfile
    ports:
      - "5000:3000"
    volumes:
      - .:/app
      - ./services/backend/node_modules:/app/services/backend/node_modules
    command: bash -c "yarn workspace @services/backend start"
  prisma:
    build:
      context: ./
      dockerfile: ./docker/packages/prisma.Dockerfile
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: mysql://root:root_password@db:3306/demo_budget_app
    volumes:
      - .:/app
      - ./packages/prisma/node_modules:/app/packages/prisma/node_modules
    command: bash -c "yarn workspace @packages/prisma prisma studio"
  db:
    platform: linux/x86_64
    image: mysql:5.7
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: demo_budget_app
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: password
    volumes:
      - db:/var/lib/mysql
volumes:
  db:

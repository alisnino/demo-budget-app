version: "3.1"

services:
  frontend:
    build:
      context: ./
      dockerfile: ./docker/services/frontend.Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - ./services/frontend/node_modules:/app/services/frontend/node_modules
    command: bash -c "yarn workspace @services/frontend dev"
  backend:
    build:
      context: ./
      dockerfile: ./docker/services/backend.Dockerfile
    ports:
      - "5000:3000"
    volumes:
      - .:/app
      - ./services/backend/node_modules:/app/services/backend/node_modules
    command: bash -c "yarn workspace @services/backend start"
